name: Release

# Push a version tag (e.g. v0.1.0) to build the app and publish a GitHub Release
# with a downloadable installer that end users can run to install/update the app.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Publish (self-contained win-x64)
        run: dotnet publish YGODuelSimulator.csproj -c Release /p:PublishProfile=win-x64 /p:Version=${{ steps.version.outputs.version }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      # Pull the previous release so Velopack can build small delta updates.
      # Ignored on the very first release when no prior release exists.
      - name: Download previous release
        continue-on-error: true
        run: vpk download github --outputDir releases --repoUrl ${{ github.server_url }}/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}

      - name: Package installer
        run: vpk pack --packId YGODuelSimulator --packTitle "YGO Duel Simulator" --packVersion ${{ steps.version.outputs.version }} --packDir bin/Release/publish/win-x64 --mainExe "YGO Duel Simulator.exe" --outputDir releases

      - name: Publish GitHub Release
        run: vpk upload github --outputDir releases --repoUrl ${{ github.server_url }}/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --publish --releaseName "YGO Duel Simulator ${{ steps.version.outputs.version }}" --tag ${{ github.ref_name }}
